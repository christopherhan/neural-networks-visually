name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run build
      - run: npx linkinator ./dist --recurse --silent --skip "^https?://(?!localhost)"
      # Guard the deployed artifact shape: a base-path build must not emit
      # unprefixed internal links (a site/base regression means 404s on Pages)
      - name: Check base-path build
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm run build
          if grep -rlE '(href|src|component-url|renderer-url)="/(chapters/|_astro/)' dist --include='*.html'; then
            echo 'Unprefixed internal links found in base-path build' >&2
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # withastro/action does NOT inject site/base itself; we derive them
      # from the repo so the project page works at /<repo>/
      - uses: withastro/action@v3
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
